apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: service-b
  namespace: services
spec:
  interval: 1m
  install:
    createNamespace: true
  chart:
    spec:
      chart: ./apps/service-b/helm
      sourceRef:
        kind: GitRepository
        name: platform-gitops
        namespace: flux-system
  values:
    image:
      repository: agilesolutions/service-b
      tag: 0.0.2
    service:
      port: 8080
    ingress:
      enabled: true
      className: nginx
      host: service-b.local
