apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-db-secret
spec:
  refreshInterval: 5m

  secretStoreRef:
    name: azure-kv
    kind: ClusterSecretStore

  target:
    name: {{ .Release.Name }}-db-secret

  data:
    - secretKey: password
      remoteRef:
        key: postgres-password